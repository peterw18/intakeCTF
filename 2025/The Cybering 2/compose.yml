services:
  # The Python web application service
  web:
    # Build the image from the Dockerfile in the current directory
    build: .
    # Map port 80 on the host to port 80 in the container
    ports:
      - "80:80"
    # Make the web service start after the db service is ready
    depends_on:
      - db
    # Pass environment variables to the web container
    # These override the ones in the Dockerfile, which is good practice
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=password
      - MYSQL_DB=db

  # The MySQL database service
  db:
    # Use the official MySQL image from Docker Hub
    image: mysql:8.0
    # Always restart the container if it stops
    restart: always
    # Set environment variables for the MySQL container to initialize the database
    environment:
      MYSQL_DATABASE: 'db'
      MYSQL_USER: 'admin'
      MYSQL_PASSWORD: 'password'
      # It's also required to set a root password
      MYSQL_ROOT_PASSWORD: 'rootpassword'
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
